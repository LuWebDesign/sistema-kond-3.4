# SDD openspec bootstrap — testing capabilities snapshot
project: sistema-kond-3.4
persistence: openspec
detected_stack:
  - static_site: repo root (index.html, home.html, js/)
  - next_app: next-app (Next.js pages-router)
next_app:
  path: next-app
  next_version: "^16.1.6"
  react_version: "^19.2.0"
  engines_node: "22.x"
ci:
  ci_node: 20
  ci_path: .github/workflows/ci.yml
node_mismatch: true
testing:
  strict_tdd: true  # defaulted because a test runner/tool (playwright) was detected
  test_runners:
    - name: playwright
      version: "1.59.1"
      location: next-app/package.json (devDependency)
      type: e2e/automation
  linters:
    - name: eslint
      version: "9.39.1"
      location: next-app/package.json (devDependency)
  test_scripts_present: false
notes: |
  - Playwright is present as a devDependency but there are no dedicated npm "test" scripts in next-app/package.json.
  - CI uses Node 20 while next-app declares engines.node = 22.x — this is a common source of build failures; recommend aligning local/CI Node versions.
  - .atl/skill-registry.md exists and was NOT modified by sdd-init.
